# DCF inputs — every value must trace to a primary source (screener.in / annual report /
# exchange filing). The engine computes only what you put here; it cannot detect a guess.
# Use ₹ Crore for ALL money fields and ₹ Crore for shares, so per-share lands in ₹.
# Copy this file, fill with sourced numbers, drop the unused alternative of each pair.

currency_unit: "INR Crore"
years: 10                       # explicit horizon; use 15 for a genuinely YOUNG/high-growth firm
# Life-cycle stage drives WHICH levers matter (see reference § "Diagnose first") — set it honestly:
lifecycle_stage: mature_stable  # start_up | young_growth | high_growth | mature_growth | mature_stable | decline

# --- base (sourced from the latest consolidated financials) ----------------------------
base_revenue: 90000.0           # latest FY / TTM revenue          [src: screener FY24 P&L]
shares_outstanding: 700.0       # diluted share count, ₹ Cr units  [src: screener shareholding]
net_debt: 12000.0               # total debt − cash                [src: screener balance sheet]
non_operating_cash: 0.0         # cash/investments not in FCFF      [src: balance sheet]
minority_interest: 0.0          # minority interest to subtract     [src: balance sheet]
current_price: 1500.0           # market price/share, ₹             [src: yfinance/NSE]

# --- revenue growth: EITHER an explicit path OR a high->fade glide ----------------------
# revenue_growth: [0.15, 0.15, 0.13, 0.12, 0.11, 0.10, 0.09, 0.08, 0.08, 0.07]
growth_glide:                   # 15% for 3y, then linear fade toward the terminal rate by year 10
  initial: 0.15                 #   [story: TAM + share gains from <edge>]
  fade_to: 0.07                 #   [land near terminal growth — no discontinuity into perpetuity]
  years_high: 3

# --- operating margin (pre-tax EBIT margin): explicit path OR a glide -------------------
# operating_margin: [0.18, 0.19, 0.20, 0.21, 0.22, 0.22, 0.22, 0.22, 0.22, 0.22]
margin_glide:                   # ramp 18% -> 22% by year 5, hold
  start: 0.18                   #   [src: current EBIT margin]
  target: 0.22                  #   [benchmark: peer steady-state margins]
  year_target: 5

tax_rate: 0.25                  # effective -> statutory            [src: P&L tax/PBT, India ~25%]
sales_to_capital: 2.5           # ₹ sales per ₹ invested (scalar or list) [hist: ΔRev/ΔInvCapital]

# --- discount rate: EITHER a single `wacc` OR a `wacc_buildup` (preferred for India: makes
#     the country-risk premium explicit instead of buried in one guessed number) ----------
# wacc: 0.13                     # CoE+CoD weighted, ₹ terms — OR build it up (preferred):
wacc_buildup:
  risk_free: 0.07               # G-sec in the cash-flow currency  [src: live yield, moves]
  beta: 1.1                     # bottom-up / sector beta          [src: peer betas]
  mature_erp: 0.045             # Damodaran mature-market ERP      [src: his ERP page, moves yearly]
  country_risk_premium: 0.03    # India CRP                        [src: Damodaran country tables, moves]
  lambda_country: 1.0           # India OPERATING exposure: ~1 domestic; ~0.1 for an IT exporter (see reference)
  cost_of_debt_pretax: 0.09     # [src: interest/avg debt or rating spread]
  equity_weight: 0.90           # market-value weights
  tax_rate: 0.25

# --- terminal (stable-growth firm) -----------------------------------------------------
# terminal_growth: bound by risk_free IN THE CASH-FLOW CURRENCY (~6.5-7% ₹ G-sec for a domestic
#   firm; NOT a 4% US habit). For a DECLINING firm use <= 0. Reason it from the stage, don't default.
terminal_growth: 0.065
terminal_wacc: 0.12             # mature-firm discount rate (defaults to last wacc)
terminal_margin: 0.22           # steady-state margin (defaults to last margin)
terminal_roic: 0.15             # return on new capital in perpetuity; > wacc only if moat persists
risk_free: 0.07                 # G-sec in cash-flow currency; bounds terminal growth + the g_T flag

# --- post-operating adjustments: apply ONLY when the diagnosis calls for them (see reference) ---
# failure_probability: 0.10     # distress haircut — loss-making + heavy debt, or decline-phase; ~0 for mature
# failure_recovery: 0.0         # fraction of equity recovered in failure (usually 0)
# complexity_discount: 0.20     # governance/cross-holding/promoter-control haircut (the Adani move); 0 if clean
