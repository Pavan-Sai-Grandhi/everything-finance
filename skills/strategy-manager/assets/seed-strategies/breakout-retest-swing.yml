# SEED STRATEGY — draft, must be validated before trading. Source: .refs/swing-strategies.txt §3 Strategy 2.
# Variant of the breakout example spec: waits for a RETEST of the broken level (fewer false breakouts).
name: breakout-retest-swing
version: 1
created: 2026-06-12
archetype: breakout
goal: "Enter consolidation breakouts on the retest, not the breakout bar — midcaps/momentum names"
source_references:
  - ".refs/swing-strategies.txt §3 Strategy 2 — Breakout and Retest"

status: draft
lifecycle:
  generated_at: 2026-06-12
  validated_at: null
  activated_at: null
  deactivated_at: null
  deactivated_reason: null

regime_required:
  market_trend: up
  nifty_above: ema200
  vix_max: 22
  breadth_min_pct: 50
  macro_notes: "needs participation; breakouts fail in low-breadth/choppy tapes"

universe:
  source: nifty500
  liquidity_min_adv_cr: 5

screening:
  fundamental:
    provider: screener.in
    query: >
      Market Capitalization > 1000 AND Return on capital employed > 12
      AND Debt to equity < 1 AND Profit growth > 0
    max_survivors: 60
  technical:
    provider: tradingview
    market: india
    tradingview_filters:
      - "Simple Moving Average (50) > Simple Moving Average (200)"
      - "Price >= 52 Week High * 0.95"                  # near the breakout zone
      - "Volume > 1.5 * Average Volume (10)"
    compute_filters:
      - "ema50_rising"
      - "Close > hh20"                                  # broke the prior 20-day high
      - "Volume > 1.2 * vol10"
  fallback_compute: true

ranking:
  metric: return_6m
  top_n: 10
  equal_weight: true

entry:
  trigger: "close above a >=4-week consolidation high on volume > 1.5x 10d avg, THEN a bullish candle on the retest of the breakout pivot"
  confirm_indicators: [volume_surge_on_breakout, low_volume_on_retest]
  timeframe: daily

exit:
  stop: range_low                                       # below the broken pivot / consolidation
  target: "measured_move of the consolidation; else next_resistance"
  min_rrr: 1.8
  time_stop_sessions: 20

sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0
  max_positions: 8
  max_sector_pct: 25

risk:
  max_portfolio_heat_pct: 6
  rebalance: none

indicator_study:
  tradingview_symbols: []
  applied_indicators: [EMA50, EMA200, Volume, "Donchian/20d high"]
  screenshots: []
  visual_confirms: ""

expectancy_assumptions:
  win_rate: null
  avg_win_R: null
  expectancy_R: null
  profit_factor: null
  n_trades: null
  validated_by: null

live_performance:
  trades_closed: 0
  win_rate: null
  expectancy_R: null
  profit_factor: null
  last_updated: null
  drift_note: null

optimization_log: []
