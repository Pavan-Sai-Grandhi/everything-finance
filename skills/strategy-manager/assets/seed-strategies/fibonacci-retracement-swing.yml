# SEED STRATEGY — draft, must be validated before trading. Source: .refs/swing-strategies.txt §3 Strategy 5.
name: fibonacci-retracement-swing
version: 1
created: 2026-06-12
archetype: pullback
goal: "Buy 38.2-61.8% Fibonacci retracements of a strong impulse leg, confirmed by a bullish candle + RSI>40"
source_references:
  - ".refs/swing-strategies.txt §3 Strategy 5 — Fibonacci Swing Trading"

status: draft
lifecycle:
  generated_at: 2026-06-12
  validated_at: null
  activated_at: null
  deactivated_at: null
  deactivated_reason: null

regime_required:
  market_trend: up
  nifty_above: ema200
  vix_max: 20
  breadth_min_pct: 45
  macro_notes: "needs a clean prior impulse leg; the fib zone is drawn manually — flag for chart confirm"

universe:
  source: nifty500
  liquidity_min_adv_cr: 5

screening:
  fundamental:
    provider: screener.in
    query: >
      Market Capitalization > 1000 AND Return on capital employed > 12
      AND Debt to equity < 1
    max_survivors: 60
  technical:
    # The fib zone (lib/ta.py fib_levels) is computed per-stock on the shortlist; the coarse cut
    # just finds uptrending names that have recently pulled back into a 38-62% band.
    provider: compute
    market: india
    tradingview_filters:
      - "Simple Moving Average (50) > Simple Moving Average (200)"
      - "Relative Strength Index (14) between 40 and 55"
    compute_filters:
      - "ema50_rising"
      - "rsi14 between 40 and 55"
  fallback_compute: true

ranking:
  metric: rs_vs_nifty
  top_n: 10
  equal_weight: true

entry:
  trigger: "bullish candle at the 38.2/50/61.8% retracement of the last impulse up-leg, with RSI(14) > 40 and stabilising volume"
  confirm_indicators: [fib_38_to_62_zone, rsi_above_40]
  timeframe: daily

exit:
  stop: recent_swing_low                                  # below the 61.8% level / swing low
  target: "prior swing high, then 1.272/1.618 extension; min 2R"
  min_rrr: 2.0
  time_stop_sessions: 15

sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0
  max_positions: 8
  max_sector_pct: 25

risk:
  max_portfolio_heat_pct: 6
  rebalance: none

indicator_study:
  tradingview_symbols: []
  applied_indicators: [EMA50, EMA200, RSI, "Fibonacci retracement"]
  screenshots: []
  visual_confirms: ""

expectancy_assumptions:
  win_rate: null
  avg_win_R: null
  expectancy_R: null
  profit_factor: null
  n_trades: null
  validated_by: null

live_performance:
  trades_closed: 0
  win_rate: null
  expectancy_R: null
  profit_factor: null
  last_updated: null
  drift_note: null

optimization_log: []
