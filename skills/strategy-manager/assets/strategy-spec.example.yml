# Strategy spec — the contract the everything-finance skills consume.
# strategy-manager owns this file's whole lifecycle (generate -> validate -> select -> optimize).
# It is written from the REFERENCE ARTICLE(S) the user supplied (trade logic) + the system
# framework (risk layer), then validated by backtest and tuned by live trade outcomes.
#   find-trade     reads universe/screening/entry/exit/sizing of an ACTIVE, regime-fitting spec.
#   backtest       reads entry/exit/sizing and writes results into expectancy_assumptions.
#   trade-tracker  reads regime_required of a trade's linked strategy; feeds closed trades back.
# Every field must be present.  (Full schema doc: <plugin>/lib/contracts.md)

name: nifty500-momentum-swing        # kebab-case id, also the filename
version: 1                           # bump on each optimization that changes the rules
created: 2026-06-11                   # YYYY-MM-DD
archetype: momentum                   # free-form label for the method, taken from the source article
goal: "Positional momentum on liquid large/mid-caps"
source_references:                    # where the trade logic came from — REQUIRED, never empty
  - "https://example.com/the-article-the-user-gave"   # URL or local file path

# ---- LIFECYCLE (strategy-manager owns these) -------------------------------
status: draft                         # draft | active | inactive
# draft    = generated; NOT yet validated by backtest (or visual study pending). Not tradeable.
# active   = backtest PASSED (expectancy_R > 0.2 over >= ~30 trades). Eligible to be SELECTED
#            when the live regime fits regime_required. find-trade runs only active+fitting specs.
# inactive = retired: failed backtest, OR deactivated by optimization (live edge gone), OR manual.
# NOTE: regime-fit is decided at SELECTION time (mode: pick) against the live regime — it is NOT a
# status. A spec stays "active" through regimes; it simply isn't selected while the tape doesn't fit.
lifecycle:
  generated_at: 2026-06-11            # when mode:generate produced it
  validated_at: null                  # when backtest first passed -> status active
  activated_at: null                  # when it became eligible to trade
  deactivated_at: null
  deactivated_reason: null            # e.g. "live expectancy -0.3R over 14 trades"

regime_required:                      # the conditions the SOURCE ARTICLE claims it works in;
  market_trend: up                    # checked against live regime.json at selection (mode: pick)
  nifty_above: ema200                 # up | range | down
  vix_max: 20                         # stand down / resize above this
  breadth_min_pct: 50                 # % of sectoral indices above their 50-EMA
  macro_notes: "risk-on; repo on hold/cutting; FII flows neutral-or-positive"

universe:
  source: nifty500                    # nifty50 | nifty500 | largecap20 | [explicit tickers]
  liquidity_min_adv_cr: 5             # min avg daily turnover in ₹ Cr

# ---- SCREENING: how find-trade cuts the universe down to a candidate shortlist ----
# This is the COARSE filter (whole universe -> ~dozens), distinct from `entry` below
# (the FINE, per-stock trigger find-trade then constructs from OHLCV on the shortlist).
# Each stage names the PROVIDER that runs it and is OPTIONAL. find-trade runs the stages
# top-to-bottom, each narrowing the survivors of the last:
#   fundamental -> screener.in   (business-quality cut: market cap, ROCE, D/E, growth)
#   technical   -> tradingview   (chart-state cut: trend/RSI/volume, screened server-side)
# Provider unreachable + fallback_compute:true -> find-trade reproduces the cut locally
# from yfinance OHLCV via lib/ta.py (the `compute_*` predicates), and flags the degrade.
screening:
  fundamental:
    provider: screener.in             # screener.in | none  (none = skip the quality gate)
    query: >                          # screener.in query-language; run on the screen builder (auth cookies)
      Market Capitalization > 1000 AND Return on capital employed > 12
      AND Debt to equity < 1 AND Profit growth > 0 AND Sales growth 3Years > 8
    max_survivors: 60                 # cap; tighten the query (e.g. ROCE > 15) if exceeded
  technical:
    provider: tradingview             # tradingview | compute  (compute = local yfinance + lib/ta.py)
    market: india                     # TradingView scanner market (POST scanner.tradingview.com/india/scan)
    # find-trade runs these via the scanner JSON API (no browser/login needed for standard filters);
    # it maps each row to a scanner filter — column names: SMA50, SMA200, RSI, close, volume, market_cap_basic;
    # cross-column tests become {"left":"SMA50","operation":"greater","right":"SMA200"}.
    tradingview_filters:              # human-readable rows (also used for the browser fallback)
      - "Simple Moving Average (50) > Simple Moving Average (200)"   # uptrend structure
      - "Price > Simple Moving Average (50)"
      - "Relative Strength Index (14) between 40 and 60"             # healthy-continuation zone
      - "Volume > 1.5 * Average Volume (10)"                          # participation
    compute_filters:                  # equivalent local predicates (lib/ta.py columns) for the fallback path
      - "ema50_rising"
      - "Close > ema50"
      - "rsi14 between 40 and 60"
  fallback_compute: true              # provider down -> screen locally with lib/ta.py instead of aborting

ranking:                              # used by basket/ranked methods (else null)
  metric: return_12m                  # return_12m | return_6m | rs_vs_nifty
  top_n: 12
  equal_weight: true

entry:
  trigger: "close > prior_20d_high AND volume > 1.5 * vol10"   # human-readable description
  # MACHINE-READABLE trigger — the list of filter expressions lib/strategy.py evaluates
  # bar-by-bar (backtest) and on the latest bar (live screen), so both fire identically.
  # Same SAFE mini-language as compute_filters: "<col>", "A > B", "A between X and Y",
  # "k * col", "A or B"; the list is ANDed. Columns can be any lib/ta.py feature:
  #   - parameterized indicators <kind><N>[_rising]: ema21, sma100, rsi9, atr20, adx14,
  #     hh50, ll20, vol30, nr5, ema21_rising  (any period — no plugin change needed)
  #   - registered patterns/signals: inside_bar, outside_bar, engulfing, hammer, doji,
  #     coil_breakout, golden_cross, macd_bullish_cross, rsi_oversold, bb_squeeze,
  #     volume_surge, gap_up, new_high_20, new_high_52w, ...  (see lib/ta.py FEATURES)
  # This is the FINE per-bar trigger; compute_filters above is the COARSE universe cut. If omitted, the
  # backtest falls back to compute_filters (fine for pullback/reversal setups whose state IS
  # the entry); breakout/coil setups need it (e.g. coil_breakout) to fire on the real trigger.
  signal:
    - "Close > hh20"
    - "Volume > 1.5 * vol10"
    - "ema50_rising"
  confirm_indicators: [ema50_rising, rsi_40_60]
  timeframe: daily

exit:
  stop: recent_swing_low              # recent_swing_low | ema50_minus_2atr | range_low
                                      # (auto-floored at max(0.5*ATR, 1% of price) so a
                                      #  squeeze candle's low can't collapse the risk denominator)
  target: "next_resistance; for blue-sky use measured_move"
                                      # measured_move | next_resistance | none/trailing/signal
                                      #   -> use none/trailing when trail_atr or exit_signal
                                      #      governs the close (no fixed take-profit)
  min_rrr: 1.5
  time_stop_sessions: 20
  # Optional — match these to the source's ACTUAL exit instead of approximating it:
  # trail_atr: 2.5                    # ATR trailing stop — let momentum/trend winners run
  #                                   #   (don't fake it with a long time-stop)
  # exit_signal: "Close > sma5"       # close on a condition (same grammar as entry.signal):
  #                                   #   mean-reversion exit (Connors: revert above 5-SMA),
  #                                   #   trend-break exit ("Close < ema20"), etc.

sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0             # qty = capital*1% / (entry-stop)
  max_positions: 8
  max_sector_pct: 25

risk:
  max_portfolio_heat_pct: 6           # sum of open per-trade risk
  rebalance: monthly                  # monthly | weekly | none

indicator_study:                      # filled by the mandatory TradingView step
  tradingview_symbols: []             # e.g. [NSE:RELIANCE, NSE:TCS]
  applied_indicators: [EMA50, EMA200, RSI, Volume]
  screenshots: []                     # artifacts/YYYY-MM-DD/tv/*.png
  visual_confirms: ""                 # one line: did the live charts agree with the rules?

expectancy_assumptions:               # BACKTEST results — null until validate passes
  win_rate: null                      # 0..1
  avg_win_R: null
  expectancy_R: null                  # the activation gate: > 0.2 with >= ~30 trades
  profit_factor: null
  n_trades: null
  validated_by: null                  # path to the backtest summary artifact

live_performance:                     # REALIZED from trade-tracker closed trades — null until trades exist
  trades_closed: 0
  win_rate: null
  expectancy_R: null                  # compare to expectancy_assumptions.expectancy_R for drift
  profit_factor: null
  last_updated: null
  drift_note: null                    # one line: live vs backtest (e.g. "live 0.05R vs backtest 0.35R — decaying")

optimization_log: []                  # dated entries appended by mode:optimize, e.g.
  # - {date: 2026-08-01, change: "tightened time_stop 20->15", reason: "TIME exits 60% of losers", revalidated: true}
